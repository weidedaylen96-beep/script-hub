<!DOCTYPE html>
<html>

<head>

<title>Creator Avatar Shop</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;

color:white;

background:
linear-gradient(
rgba(2,6,23,.85),
rgba(2,6,23,.95)
),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;

background-attachment:fixed;

}



/* MENU */

nav{

padding:20px;

text-align:center;

background:rgba(255,255,255,.1);

backdrop-filter:blur(20px);

}


nav a{

color:white;

text-decoration:none;

margin:15px;

font-weight:bold;

}



/* TITEL */


h1{

text-align:center;

font-size:65px;

padding-top:40px;

background:linear-gradient(
90deg,
#60a5fa,
#c084fc,
#f472b6
);

-webkit-background-clip:text;

color:transparent;

}




.container{

max-width:1400px;

margin:auto;

padding:30px;

}




.shop{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}





.card{

background:rgba(255,255,255,.1);

border:1px solid rgba(255,255,255,.2);

border-radius:25px;

padding:20px;

backdrop-filter:blur(20px);

transition:.3s;

}



.card:hover{

transform:translateY(-10px);

box-shadow:0 20px 40px black;

}



.card img{

width:100%;

height:200px;

object-fit:cover;

border-radius:20px;

}




.price{

font-size:28px;

color:#60a5fa;

font-weight:bold;

}




.buy{

display:block;

margin-top:15px;

padding:14px;

background:white;

color:black;

text-align:center;

border-radius:20px;

text-decoration:none;

font-weight:bold;

}





.tag{

display:inline-block;

background:#9333ea;

padding:7px 15px;

border-radius:20px;

}



</style>

</head>



<body>



<nav>

<a href="index.html">🏠 Home</a>

<a href="shop.html">🛒 Shop</a>

<a href="downloads.html">📦 Downloads</a>

<a href="admin.html">👑 Admin</a>

</nav>





<h1>
🎮 Avatar Creator Marketplace
</h1>



<div class="container">

<div class="shop" id="shop"></div>

</div>





<script>


let producten = [];


let afbeeldingen = [

"https://tr.rbxcdn.com/180DAY-6f1c6f5f5e1a4e1b9f4e/420/420/Image/Webp",

"https://tr.rbxcdn.com/180DAY-8b7c7d2e5f3a4c8d9a2b/420/420/Image/Webp",

"https://tr.rbxcdn.com/180DAY-2a4c6d8e1f3b5a7c9d0e/420/420/Image/Webp",

"https://tr.rbxcdn.com/180DAY-9d8c7b6a5e4f3d2c1b0a/420/420/Image/Webp"

];



for(let i=1;i<=49;i++){


producten.push({

naam:
"Premium Avatar Design #"+i,


prijs:
"€"+(1+(i%10))+",99",


foto:
afbeeldingen[i % afbeeldingen.length]


});


}



let shop=document.getElementById("shop");



producten.forEach(function(product){


shop.innerHTML += `


<div class="card">


<span class="tag">
NEW
</span>


<img src="${product.foto}">


<h2>
🎮 ${product.naam}
</h2>


<p>
Premium creator item voor je eigen projecten.
</p>


<div class="price">
${product.prijs}
</div>


<a class="buy" href="contact.html">
🛒 Kopen
</a>


</div>


`;



});



</script>



</body>

</html>

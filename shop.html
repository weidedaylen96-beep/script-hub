<<!DOCTYPE html>
<html>

<head>

<title>Roblox Creator Marketplace</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

margin:0;

color:white;

background:
linear-gradient(
rgba(2,6,23,.85),
rgba(2,6,23,.95)
),
url("https://images.unsplash.com/photo-1542751371-adc38448a05e");

background-size:cover;
background-attachment:fixed;

}


nav{

padding:20px;

text-align:center;

background:rgba(255,255,255,.1);

backdrop-filter:blur(20px);

}


nav a{

color:white;

text-decoration:none;

margin:15px;

font-weight:bold;

}



h1{

text-align:center;

font-size:60px;

background:linear-gradient(
90deg,
#60a5fa,
#c084fc,
#f472b6
);

-webkit-background-clip:text;

color:transparent;

}



.container{

max-width:1300px;

margin:auto;

padding:30px;

}



.shop{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}



.card{

background:rgba(255,255,255,.1);

border-radius:25px;

padding:20px;

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.2);

transition:.3s;

}


.card:hover{

transform:translateY(-10px);

}



.card img{

width:100%;

height:180px;

object-fit:cover;

border-radius:20px;

}



.price{

font-size:25px;

color:#60a5fa;

font-weight:bold;

}



.button{

display:block;

background:white;

color:black;

padding:12px;

border-radius:20px;

text-align:center;

text-decoration:none;

font-weight:bold;

}



</style>


</head>


<body>


<nav>

<a href="index.html">🏠 Home</a>

<a href="shop.html">🛒 Shop</a>

<a href="downloads.html">📦 Downloads</a>

<a href="admin.html">👑 Admin</a>

</nav>




<h1>
🎮 Avatar Creator Shop
</h1>



<div class="container">

<div class="shop" id="shop"></div>

</div>





<script>


let producten = [];


for(let i = 1; i <= 49; i++){

producten.push({

naam:
"Avatar Design Pack #"+i,

prijs:
"€"+(1+i%9)+",99",

afbeelding:
"https://tr.rbxcdn.com/180DAY-"+i+"/420/420/Image/Webp"

});

}





let shop =
document.getElementById("shop");



producten.forEach(function(item){


shop.innerHTML += `


<div class="card">


<img src="${item.afbeelding}">


<h2>
🎮 ${item.naam}
</h2>


<p>
Premium Roblox creator item.
</p>


<div class="price">

${item.prijs}

</div>


<br>


<a class="button" href="contact.html">

🛒 Kopen

</a>


</div>


`;


});


</script>



</body>

</html>

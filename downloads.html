<!DOCTYPE html>
<html>
<head>
    <title>Downloads</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f2f2f2;
            padding: 40px;
            transition: 0.3s;
        }

        nav {
            margin-bottom: 30px;
        }

        nav a {
            text-decoration: none;
            margin: 10px;
            color: #007bff;
            font-weight: bold;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 700px;
            margin: auto;
        }

        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin: 15px;
        }

        .download {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
        }

        input {
            padding: 12px;
            width: 80%;
            border-radius: 8px;
            border: 1px solid #aaa;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .dark {
            background: #111;
            color: white;
        }

        .dark .box,
        .dark .card {
            background: #222;
            color: white;
        }

        .dark nav a {
            color: #66b3ff;
        }
    </style>

</head>

<body>

<nav>
    <a href="index.html">🏠 Home</a>
    <a href="downloads.html">📦 Downloads</a>
    <a href="over.html">ℹ️ Over ons</a>
</nav>


<button onclick="donker()">🌙 Donkere modus</button>

<div class="box">

<h1>📦 Downloads</h1>

<input 
type="text" 
id="search" 
placeholder="Zoek een download..."
onkeyup="zoek()">


<div class="card">
<h2>📄 Voorbeeld bestand</h2>
<p>Een simpel testbestand.</p>
<a class="download" href="voorbeeld.txt" download>
Download
</div>
</a>
</div>


<div class="card">
<h2>📜 Script</h2>
<p>Een handig script bestand.</p>
<a class="download" href="script.txt" download>
Download
</a>
    <p>⬇️ Downloads: 25</p>
</div>


<div class="card">
<h2>🎮 Game bestand</h2>
<p>Een game bestand.</p>
<a class="download" href="game.txt" download>
Download
</a>
</div>


</div>


<script>

function donker() {
    document.body.classList.toggle("dark");
}


function zoek() {

let input = document.getElementById("search").value.toLowerCase();

let kaarten = document.getElementsByClassName("card");


for(let i = 0; i < kaarten.length; i++){

let tekst = kaarten[i].innerText.toLowerCase();


if(tekst.includes(input)){
    kaarten[i].style.display = "block";
}
else{
    kaarten[i].style.display = "none";
}

}

}

</script>


</body>
</html>

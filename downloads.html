<!DOCTYPE html>
<html>

<head>

<title>Downloads - Download Hub</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    text-align: center;
    padding: 30px;
    transition: 0.3s;
}


nav {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 25px;
}


nav a {
    text-decoration: none;
    margin: 10px;
    color: #2563eb;
    font-weight: bold;
}


.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    max-width: 800px;
    margin: auto;
    box-shadow: 0 5px 20px #ddd;
}


input {
    width: 80%;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #aaa;
    margin: 15px;
}


button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin: 5px;
}


.card {
    background: #ffffff;
    padding: 25px;
    margin: 20px;
    border-radius: 20px;
    box-shadow: 0 5px 15px #ddd;
}


.card img {
    width: 100%;
    max-width: 300px;
    border-radius: 15px;
}


.download {
    display: inline-block;
    background: #2563eb;
    color: white;
    padding: 12px 25px;
    border-radius: 10px;
    text-decoration: none;
}


.download:hover {
    background: #1d4ed8;
}


/* Donkere modus */

.dark {
    background: #111;
    color: white;
}


.dark .box,
.dark .card,
.dark nav {
    background: #222;
    color: white;
}


.dark nav a {
    color: #60a5fa;
}


</style>

</head>


<body>


<nav>

<a href="index.html">🏠 Home</a>
<a href="downloads.html">📦 Downloads</a>
<a href="over.html">ℹ️ Over ons</a>
<a href="login.html">🔐 Login</a>
<a href="profiel.html">👤 Profiel</a>
<a href="admin.html">👑 Admin</a>

</nav>



<button onclick="donker()">🌙 Donkere modus</button>



<div class="box">


<h1>📦 Downloads</h1>


<input 
id="search"
placeholder="🔍 Zoek download..."
onkeyup="zoek()">



<br>


<button onclick="filter('all')">
📦 Alle
</button>

<button onclick="filter('script')">
📜 Scripts
</button>

<button onclick="filter('game')">
🎮 Games
</button>

<button onclick="filter('tool')">
🛠️ Tools
</button>



<div class="card script">


<img src="https://via.placeholder.com/300x150">

<h2>📜 Script</h2>

<p>Een handig script bestand.</p>

<a class="download" href="script.txt" download>
Download
</a>


</div>




<div class="card game">


<img src="https://via.placeholder.com/300x150">

<h2>🎮 Game bestand</h2>

<p>Een leuk game bestand.</p>

<a class="download" href="game.txt" download>
Download
</a>


</div>





<div class="card tool">


<img src="https://via.placeholder.com/300x150">

<h2>🛠️ Tool</h2>

<p>Een handige tool.</p>

<a class="download" href="tool.txt" download>
Download
</a>


</div>




</div>





<script>


function donker(){

document.body.classList.toggle("dark");

}




function zoek(){

let input =
document.getElementById("search").value.toLowerCase();

let kaarten =
document.getElementsByClassName("card");


for(let i=0;i<kaarten.length;i++){

let tekst =
kaarten[i].innerText.toLowerCase();


if(tekst.includes(input)){

kaarten[i].style.display="block";

}

else{

kaarten[i].style.display="none";

}

}

}





function filter(categorie){

let kaarten =
document.getElementsByClassName("card");


for(let i=0;i<kaarten.length;i++){


if(categorie=="all" ||
kaarten[i].classList.contains(categorie)){


kaarten[i].style.display="block";


}

else{


kaarten[i].style.display="none";


}


}


}


</script>



</body>

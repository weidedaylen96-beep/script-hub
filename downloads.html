<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:Arial,sans-serif;

background:
linear-gradient(
rgba(5,8,22,.85),

),

nav{

.cards{

.card{

background:rgba(255,255,255,.12);

backdrop-filter:blur(15px);

border-radius:25px;

width:300px;

}



.card:hover{

}




img{

}

}



button{

margin-top:15px;

padding:14px 25px;

border:none;

border-radius:15px;

background:#2563eb;

color:white;

font-weight:bold;

cursor:pointer;

}



button:hover{

background:#3b82f6;

}



.tag{

background:#9333ea;

padding:8px 15px;

border-radius:20px;

display:inline-block;

}



footer{

<script>


function controle(naam,bestand){


let user=document.getElementById(naam).value;


if(user===""){

alert("Vul eerst je Roblox username in!");

return;

}


alert("Bedankt "+user+"! Je download start.");

window.location.href=bestand;


}




function download1(){

controle("naam1","roblox-script.zip");

}



function download2(){

controle("naam2","tool-pack.zip");

}



function download3(){

controle("naam3","game-pack.zip");

}



</script>

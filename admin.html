<!DOCTYPE html>
<html>

<head>

<title>Download Hub Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;

background:

radial-gradient(circle at top,#2563eb,#020617 45%);

color:white;

min-height:100vh;

}



/* MENU */

nav{

padding:20px;

text-align:center;

background:rgba(255,255,255,.1);

backdrop-filter:blur(20px);

}



nav a{

color:white;

text-decoration:none;

margin:15px;

font-weight:bold;

}




.container{

max-width:1100px;

margin:auto;

padding:40px 20px;

}



.title{

text-align:center;

font-size:60px;

background:linear-gradient(
90deg,
#facc15,
#38bdf8,
#a855f7
);

-webkit-background-clip:text;

color:transparent;

}



.box{

background:rgba(255,255,255,.1);

backdrop-filter:blur(25px);

border-radius:35px;

padding:35px;

margin-top:30px;

border:1px solid rgba(255,255,255,.2);

box-shadow:0 20px 50px black;

}



input{

width:100%;

padding:15px;

margin:10px 0;

border-radius:15px;

border:none;

font-size:16px;

}



button{

padding:15px;

width:100%;

border:none;

border-radius:25px;

background:linear-gradient(
90deg,
#2563eb,
#a855f7
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}



button:hover{

transform:scale(1.03);

}




.product{

display:flex;

align-items:center;

gap:20px;

background:rgba(255,255,255,.08);

padding:20px;

border-radius:25px;

margin-top:20px;

}



.product img{

width:120px;

height:120px;

object-fit:cover;

border-radius:20px;

}



.delete{

background:#ef4444;

margin-top:10px;

padding:10px;

}



@media(max-width:700px){

.title{

font-size:40px;

}


.product{

flex-direction:column;

text-align:center;

}


}

</style>


</head>


<body>


<nav>

<a href="index.html">🏠 Home</a>

<a href="shop.html">🛒 Shop</a>

<a href="admin.html">👑 Admin</a>

</nav>





<div class="container">



<h1 class="title">
👑 Admin Dashboard
</h1>





<div class="box">


<h2>
🚀 Nieuw product toevoegen
</h2>



<input id="naam" placeholder="Product naam">


<input id="prijs" placeholder="Prijs">


<input id="foto" type="file" accept="image/*">



<button onclick="upload()">

📤 Upload Product

</button>



</div>






<div class="box">


<h2>
📦 Jouw producten
</h2>



<div id="producten">

</div>


</div>



</div>







<script>


let producten =
JSON.parse(localStorage.getItem("producten")) || [];




function bewaren(){

localStorage.setItem(
"producten",
JSON.stringify(producten)
);

}




function lijst(){


let plek =
document.getElementById("producten");


plek.innerHTML="";



producten.forEach((p,index)=>{


plek.innerHTML += `


<div class="product">


<img src="${p.foto}">


<div>

<h2>
${p.naam}
</h2>


<p>
€${p.prijs}
</p>



<button class="delete"
onclick="verwijderen(${index})">

🗑 Verwijderen

</button>


</div>


</div>


`;


});


}






function upload(){


let naam =
document.getElementById("naam").value;


let prijs =
document.getElementById("prijs").value;


let file =
document.getElementById("foto").files[0];



if(!naam || !prijs || !file){

alert("Vul alles in!");

return;

}



let reader=new FileReader();



reader.onload=function(e){


producten.push({

naam:naam,

prijs:prijs,

foto:e.target.result

});



bewaren();

lijst();



alert("Product toegevoegd!");



};



reader.readAsDataURL(file);



}







function verwijderen(index){


producten.splice(index,1);

bewaren();

lijst();


}




lijst();


</script>


</body>

</html>

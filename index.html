<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Hub</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
}

.box{
    width:340px;
    background:#111827;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#site{
    display:none;
    text-align:center;
    padding:80px 20px;
}

h1{
    font-size:50px;
}
</style>

</head>
<body>

<div id="login">

<div class="box">

<h2>🔐 Inloggen</h2>

<input id="user" placeholder="Gebruikersnaam">

<input id="pass" type="password" placeholder="Wachtwoord">

<button onclick="login()">Inloggen</button>

<br><br>

<button onclick="register()">Nieuw account maken</button>

</div>

</div>

<div id="site">

<h1>🎮 Download Hub</h1>

<p>Welkom op de website!</p>

</div>

<script>

if(localStorage.getItem("ingelogd")=="ja"){
    document.getElementById("login").style.display="none";
    document.getElementById("site").style.display="block";
}

function register(){

let u=prompt("Kies een gebruikersnaam");

if(!u)return;

let p=prompt("Kies een wachtwoord");

if(!p)return;

localStorage.setItem("username",u);
localStorage.setItem("password",p);

alert("Account aangemaakt! Log nu in.");

}

function login(){

let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;

if(
u==localStorage.getItem("username") &&
p==localStorage.getItem("password")
){

localStorage.setItem("ingelogd","ja");

document.getElementById("login").style.display="none";

document.getElementById("site").style.display="block";

}else{

alert("Onjuiste gebruikersnaam of wachtwoord.");

}

}

</script>

</body>
</html>
